<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Décio Coelho | Viracopos</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#020814,#061d3a,#0a2f5a);
      color:#fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
    }

    p{
      font-size:16px;
      color:#b8c2d8;
      margin-bottom:30px;
      max-width:400px;
    }

    .btn{
      background:#25D366;
      color:#fff;
      padding:14px 22px;
      border-radius:30px;
      font-size:16px;
      text-decoration:none;
      font-weight:bold;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
      transition:.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }
  </style>
</head>

<body>

  <h1>Décio Coelho</h1>
  <p>Centro de Inteligência Profissional Digital</p>

  <a class="btn" href="#">WhatsApp</a>

</body>
</html>
